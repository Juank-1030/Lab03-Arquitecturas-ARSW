syntax = "proto3";
option java_multiple_files = true;
option java_package = "edu.eci.arsw.guide6_2.review";
option java_outer_classname = "ReviewProto";

service ReviewService {
  rpc GetReview (ReviewRequest) returns (ReviewResponse);
}

message ReviewRequest {
  int32 movieId = 1;
}

message ReviewResponse {
  int32 movieId = 1;
  string reviewer = 2;
  int32 rating = 3;
  string comment = 4;
  bool found = 5;
}
