syntax = "proto3";
option java_multiple_files = true;
option java_package = "edu.eci.arsw.guide6_2.review";
option java_outer_classname = "ReviewProto";

service ReviewService {
  rpc GetReviews (ReviewRequest) returns (ReviewList);
}

message ReviewRequest {
  int32 movieId = 1;
}

message Review {
  string author = 1;
  string comment = 2;
  int32 rating = 3;
}

message ReviewList {
  repeated Review reviews = 1;
}
